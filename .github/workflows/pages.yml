name: Deploy to GitHub Pages

# Publishes the build-free static portfolio (dc-runtime: HTML + support.js + core.js)
# to https://jaramilloh.github.io/personal-portfolio-webpage-design/ .
# `main` is the deploy branch: develop is integration, main is production. Each
# release merge (develop -> main) goes live. The github-pages environment only
# permits deployments from main, so this trigger must stay aligned with it.
# The artifact is assembled at deploy time so committed source stays canonical:
# the entry file "Juan Felipe Jaramillo.dc.html" is copied to index.html so the
# project subpath root serves the portfolio (the repo has no committed index.html).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege for the build job; deploy job needs pages + id-token to publish.
permissions:
  contents: read

# Serialize deploys; never cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    # 15 min: the LuaLaTeX compile step pulls the full TeXLive image first.
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      # Compile the CV from LaTeX source (cv-src/) into cv-src/cv.pdf. The source
      # is never published; only the resulting PDF is copied into _site/ below.
      - name: Compile CV (LuaLaTeX)
        uses: xu-cheng/latex-action@6549dc21effb2730855a1281407ecfcececc6c1b # v4
        with:
          working_directory: cv-src
          root_file: cv.tex
          latexmk_use_lualatex: true

      - name: Assemble static site
        run: |
          set -euo pipefail
          ENTRY="Juan Felipe Jaramillo.dc.html"
          rm -rf _site
          mkdir -p _site

          # dc-runtime + hexagonal core: served as-is, never built.
          cp "$ENTRY" _site/
          cp support.js core.js _site/
          cp -r assets _site/

          # Publish ONLY the compiled CV PDF (built above) at the fixed path the
          # site expects: "Juan Felipe Jaramillo.dc.html" -> CV_URL =
          # 'cv/Juan-Felipe-Jaramillo-CV.pdf'. The LaTeX source stays unpublished.
          mkdir -p _site/cv
          cp cv-src/cv.pdf "_site/cv/Juan-Felipe-Jaramillo-CV.pdf"

          # Publish the standalone "writing/" guides: self-contained HTML served
          # as-is (like the entry). This assembler is an allowlist — files not
          # copied here are NOT deployed, so new writing/ assets must be added.
          # The editable .dc.html source (writing/Protocolo.dc.html) stays unpublished.
          mkdir -p _site/writing
          cp writing/protocolo.html "_site/writing/protocolo.html"

          # Pages serves index.html at the subpath root; the repo's canonical
          # entry keeps its original name, so mirror it as index.html here.
          cp "$ENTRY" _site/index.html

          # Static HTML+JS site (filenames contain spaces/underscores) — skip Jekyll.
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
