name: Deploy to GitHub Pages

# Publishes the build-free static portfolio (dc-runtime: HTML + support.js + core.js)
# to https://jaramilloh.github.io/personal-portfolio-webpage-design/ .
# `develop` is the deploy branch (it is where all PRs land and ci.yml gates them);
# every merged PR goes live. The artifact is assembled at deploy time so committed
# source stays canonical: the entry file "Juan Felipe Jaramillo.dc.html" is copied
# to index.html so the project subpath root serves the portfolio (the repo has no
# committed index.html).

on:
  push:
    branches: [develop]
  workflow_dispatch:

# Least privilege for the build job; deploy job needs pages + id-token to publish.
permissions:
  contents: read

# Serialize deploys; never cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Assemble static site
        run: |
          set -euo pipefail
          ENTRY="Juan Felipe Jaramillo.dc.html"
          rm -rf _site
          mkdir -p _site

          # dc-runtime + hexagonal core: served as-is, never built.
          cp "$ENTRY" _site/
          cp support.js core.js _site/
          cp -r assets _site/
          # CV PDF is optional and added by the owner later; include it if present.
          if [ -d cv ]; then cp -r cv _site/; fi

          # Pages serves index.html at the subpath root; the repo's canonical
          # entry keeps its original name, so mirror it as index.html here.
          cp "$ENTRY" _site/index.html

          # Static HTML+JS site (filenames contain spaces/underscores) — skip Jekyll.
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
